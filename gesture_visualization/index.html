      const subscribeMessage = {
        op: 'subscribe',
        id: 'your_subscription_id',  // Provide a unique ID for the subscription
        topic: "/teleop_gesture_toolbox/all_states",     // Specify the ROS topic to subscribe to
        type: "std_msgs/String"       // Specify the message type
      };

      socket.send(JSON.stringify(subscribeMessage));
    });

              var activ_str = `w3-yellow`;
